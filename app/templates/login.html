<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Tagma Admin</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 60%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .login-logo img {
            height: 36px;
        }

        .login-logo span {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.5px;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 28px;
        }

        .form-group label {
            font-weight: 500;
            font-size: 13px;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 14px;
            height: 14px;
        }

        .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 12px 10px 36px;
            font-size: 14px;
            font-family: inherit;
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: linear-gradient(90deg, var(--primary-dark), var(--primary));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .alert-danger {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #b91c1c;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="/static/images/logo.png" alt="Tagma" onerror="this.style.display='none'">
            <span>Tagma</span>
        </div>
        <div class="login-title">Admin Panel</div>
        <div class="login-subtitle">Введите свои данные для входа</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert-danger">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Логин</label>
                <div class="input-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Введите логин"
                        required autocomplete="username">
                </div>
            </div>
            <div class="form-group" style="margin-top:16px;">
                <label for="password">Пароль</label>
                <div class="input-icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Введите пароль" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login">
                <svg style="width:16px;height:16px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                    <polyline points="10 17 15 12 10 7" />
                    <line x1="15" y1="12" x2="3" y2="12" />
                </svg>
                Войти
            </button>
        </form>
    </div>
</body>

</html>
